name: Deploy frontend

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Build & restart cvenom-frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20        # Next.js build is fast compared to Rust

    steps:
      - name: SSH into VPS and run frontend deploy script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 18m
          script: |
            sudo bash /opt/cvenom/src/frontend-cvenom/deploy.sh
